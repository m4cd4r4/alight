# Alight ChordMini backend - public token-gated HTTPS entry.
# Lives at /etc/nginx/conf.d/chordmini.conf on the VPS (the http{} block in
# nginx.conf gains `include /etc/nginx/conf.d/*.conf;`). __TOKEN__ is replaced
# with the real bearer token on deploy and is never committed.
#
# The container listens on 127.0.0.1:8473 only; this is its sole public route,
# and every request must carry the bearer token. Only Alight's Vercel proxy
# (which holds the token server-side) can reach it.

# Defence-in-depth: cap request rate per client IP. An analysis takes ~90s, so
# this is generous for real use but stops anyone hammering the ML backend.
limit_req_zone $binary_remote_addr zone=chordmini:1m rate=12r/m;

server {
    listen 80;
    server_name chordmini.donnacha.app;
    location /.well-known/acme-challenge/ { root /var/www/html; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    server_name chordmini.donnacha.app;

    ssl_certificate /etc/letsencrypt/live/chordmini.donnacha.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chordmini.donnacha.app/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 50M;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Signed audio downloads for in-app playback. A browser <audio> GET can't
    # carry the bearer token, so this one location is gated by an nginx
    # secure_link signature instead - minted server-side by the Vercel proxy,
    # which holds the shared secret. __AUDIO_SECRET__ is injected on deploy and
    # never committed. URLs expire (see $secure_link_expires), so a leaked link
    # stops working; the file itself is reaped after an hour regardless.
    location /audio/ {
        secure_link $arg_md5,$arg_expires;
        secure_link_md5 "$secure_link_expires$uri __AUDIO_SECRET__";
        if ($secure_link = "")  { return 403; }   # bad or missing signature
        if ($secure_link = "0") { return 410; }   # signature ok but expired
        limit_req zone=chordmini burst=10 nodelay;

        proxy_pass http://127.0.0.1:8473;
        proxy_http_version 1.1;
        proxy_buffering off;                       # stream + pass Range / 206 through
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Bearer-token gate. Anything without the exact token gets 401 before it
    # reaches the backend (which has no auth of its own).
    location / {
        if ($http_authorization != "Bearer __TOKEN__") { return 401; }
        limit_req zone=chordmini burst=5 nodelay;

        proxy_pass http://127.0.0.1:8473;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
