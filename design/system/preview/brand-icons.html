<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_card.css">
<style>
  .grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 14px 18px; justify-items: center; }
  .ico { display:flex; flex-direction: column; align-items: center; gap: 6px; color: var(--ink-primary); }
  .ico svg { width: 22px; height: 22px; }
  .ico .name { font-family: var(--font-text); font-size: 10px; color: var(--ink-tertiary); letter-spacing: 0.03em; }
</style>
</head>
<body>
<div class="card">
  <div class="grid">
    <div class="ico"><svg viewBox="0 0 24 24"><path d="M7.5 5.5 L18 12 L7.5 18.5 Z" fill="none" stroke="currentColor" stroke-width="1.25" stroke-linejoin="round"/></svg><span class="name">play</span></div>
    <div class="ico"><svg viewBox="0 0 24 24"><line x1="9" y1="5.5" x2="9" y2="18.5" stroke="currentColor" stroke-width="1.25" stroke-linecap="round"/><line x1="15" y1="5.5" x2="15" y2="18.5" stroke="currentColor" stroke-width="1.25" stroke-linecap="round"/></svg><span class="name">pause</span></div>
    <div class="ico"><svg viewBox="0 0 24 24"><path d="M14.5 5.5 L7 12 L14.5 18.5" fill="none" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round"/></svg><span class="name">prev</span></div>
    <div class="ico"><svg viewBox="0 0 24 24"><path d="M9.5 5.5 L17 12 L9.5 18.5" fill="none" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round"/></svg><span class="name">next</span></div>
    <div class="ico"><svg viewBox="0 0 24 24"><path d="M8 20 L10 5 L14 5 L16 20 Z" fill="none" stroke="currentColor" stroke-width="1.25" stroke-linejoin="round"/><line x1="12" y1="14" x2="17" y2="6" stroke="currentColor" stroke-width="1.25" stroke-linecap="round"/><line x1="9" y1="16" x2="15" y2="16" stroke="currentColor" stroke-width="1.25"/></svg><span class="name">metronome</span></div>
    <div class="ico"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3.5" fill="none" stroke="currentColor" stroke-width="1.25"/><circle cx="12" cy="12" r="7" fill="none" stroke="currentColor" stroke-width="1.25" stroke-dasharray="2 3"/></svg><span class="name">tempo</span></div>
    <div class="ico"><svg viewBox="0 0 24 24"><circle cx="10.5" cy="10.5" r="5.5" fill="none" stroke="currentColor" stroke-width="1.25"/><line x1="14.6" y1="14.6" x2="19" y2="19" stroke="currentColor" stroke-width="1.25" stroke-linecap="round"/></svg><span class="name">search</span></div>
    <div class="ico"><svg viewBox="0 0 24 24"><rect x="6" y="6" width="12" height="14" fill="none" stroke="currentColor" stroke-width="1.25"/><rect x="9" y="3.5" width="6" height="3.5" fill="none" stroke="currentColor" stroke-width="1.25"/><line x1="9" y1="11" x2="15" y2="11" stroke="currentColor" stroke-width="1.25"/><line x1="9" y1="14" x2="15" y2="14" stroke="currentColor" stroke-width="1.25"/><line x1="9" y1="17" x2="13" y2="17" stroke="currentColor" stroke-width="1.25"/></svg><span class="name">paste</span></div>
    <div class="ico"><svg viewBox="0 0 24 24"><rect x="7" y="4" width="10" height="5" fill="none" stroke="currentColor" stroke-width="1.25"/><path d="M5 9 H19 V16 H17 V20 H7 V16 H5 Z" fill="none" stroke="currentColor" stroke-width="1.25" stroke-linejoin="round"/><line x1="9" y1="14" x2="15" y2="14" stroke="currentColor" stroke-width="1.25"/></svg><span class="name">print</span></div>
    <div class="ico"><svg viewBox="0 0 24 24"><line x1="5" y1="5" x2="5" y2="19" stroke="currentColor" stroke-width="1.25"/><line x1="9" y1="5" x2="9" y2="19" stroke="currentColor" stroke-width="1.25"/><path d="M12 5.5 L15.5 4.7 L18.2 18.4 L14.7 19.2 Z" fill="none" stroke="currentColor" stroke-width="1.25" stroke-linejoin="round"/></svg><span class="name">library</span></div>
    <div class="ico"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="2.5" fill="none" stroke="currentColor" stroke-width="1.25"/><path d="M12 4.5 V6.5 M12 17.5 V19.5 M4.5 12 H6.5 M17.5 12 H19.5 M6.7 6.7 L8.1 8.1 M15.9 15.9 L17.3 17.3 M6.7 17.3 L8.1 15.9 M15.9 8.1 L17.3 6.7" stroke="currentColor" stroke-width="1.25" stroke-linecap="round"/></svg><span class="name">settings</span></div>
    <div class="ico"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3.5" fill="none" stroke="currentColor" stroke-width="1.25"/><path d="M12 3 V5 M12 19 V21 M3 12 H5 M19 12 H21 M5.6 5.6 L7 7 M17 17 L18.4 18.4 M5.6 18.4 L7 17 M17 7 L18.4 5.6" stroke="currentColor" stroke-width="1.25" stroke-linecap="round"/></svg><span class="name">light</span></div>
    <div class="ico"><svg viewBox="0 0 24 24"><path d="M19 14.5 A8 8 0 0 1 9.5 5 A7 7 0 1 0 19 14.5 Z" fill="none" stroke="currentColor" stroke-width="1.25" stroke-linejoin="round"/></svg><span class="name">dark</span></div>
    <div class="ico"><svg viewBox="0 0 24 24"><path d="M12 19 V5 M6.5 10.5 L12 5 L17.5 10.5" fill="none" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round"/></svg><span class="name">up</span></div>
    <div class="ico"><svg viewBox="0 0 24 24"><path d="M12 5 V19 M6.5 13.5 L12 19 L17.5 13.5" fill="none" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round"/></svg><span class="name">down</span></div>
    <div class="ico"><svg viewBox="0 0 24 24"><circle cx="6" cy="12" r="1" fill="currentColor"/><circle cx="12" cy="12" r="1" fill="currentColor"/><circle cx="18" cy="12" r="1" fill="currentColor"/></svg><span class="name">more</span></div>
  </div>
</div>
</body></html>
