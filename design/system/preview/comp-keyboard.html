<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="../piano.css"><link rel="stylesheet" href="_card.css">
<style>
  .pck-keyboard.demo { --pck-white-w: 38px; --pck-white-h: 160px; --pck-black-w: 22px; --pck-black-h: 100px; }
</style>
</head>
<body>
<div class="card" style="padding: 12px 20px;">
  <!-- C major triad on right hand, C single on left. One octave keyboard. -->
  <div class="pck-keyboard demo">
    <div class="pck-whites">
      <!-- C is-left is-now, E and G is-right is-now -->
      <div class="pck-key pck-white is-left is-now">
        <span class="pck-marker"><svg viewBox="0 0 12 12"><rect class="fill" x="2" y="2" width="8" height="8" fill="currentColor"/></svg></span>
        <span class="pck-note">C</span>
        <span class="pck-finger">5</span>
      </div>
      <div class="pck-key pck-white"></div>
      <div class="pck-key pck-white is-right is-now">
        <span class="pck-marker"><svg viewBox="0 0 12 12"><path class="fill" d="M6 10 L2 3 L10 3 Z" fill="currentColor"/></svg></span>
        <span class="pck-note">E</span>
        <span class="pck-finger">3</span>
      </div>
      <div class="pck-key pck-white"></div>
      <div class="pck-key pck-white is-right is-now">
        <span class="pck-marker"><svg viewBox="0 0 12 12"><path class="fill" d="M6 10 L2 3 L10 3 Z" fill="currentColor"/></svg></span>
        <span class="pck-note">G</span>
        <span class="pck-finger">1</span>
      </div>
      <div class="pck-key pck-white"></div>
      <div class="pck-key pck-white"></div>
    </div>
    <!-- Black keys: C# at offset 38, D# at 76, F# at 152, G# at 190, A# at 228 (white-w = 38) -->
    <div class="pck-key pck-black" style="--offset: 38px;"></div>
    <div class="pck-key pck-black" style="--offset: 76px;"></div>
    <div class="pck-key pck-black" style="--offset: 152px;"></div>
    <div class="pck-key pck-black" style="--offset: 190px;"></div>
    <div class="pck-key pck-black" style="--offset: 228px;"></div>
  </div>
</div>
</body></html>
