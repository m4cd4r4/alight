<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_card.css">
<style>
  .scale { display: flex; align-items: flex-end; gap: 12px; }
  .step  { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .bar   { background: var(--ink-primary); width: 100%; }
</style>
</head>
<body>
<div class="card">
  <div class="scale">
    <div class="step"><div class="bar" style="height:4px; width:4px;"></div><div class="caption">1</div><div class="value">4</div></div>
    <div class="step"><div class="bar" style="height:8px; width:8px;"></div><div class="caption">2</div><div class="value">8</div></div>
    <div class="step"><div class="bar" style="height:12px; width:12px;"></div><div class="caption">3</div><div class="value">12</div></div>
    <div class="step"><div class="bar" style="height:16px; width:16px;"></div><div class="caption">4</div><div class="value">16</div></div>
    <div class="step"><div class="bar" style="height:24px; width:24px;"></div><div class="caption">5</div><div class="value">24</div></div>
    <div class="step"><div class="bar" style="height:32px; width:32px;"></div><div class="caption">6</div><div class="value">32</div></div>
    <div class="step"><div class="bar" style="height:48px; width:48px;"></div><div class="caption">7</div><div class="value">48</div></div>
    <div class="step"><div class="bar" style="height:64px; width:64px;"></div><div class="caption">8</div><div class="value">64</div></div>
    <div class="step"><div class="bar" style="height:96px; width:96px;"></div><div class="caption">9</div><div class="value">96</div></div>
  </div>
  <div class="label" style="font-size: 12px;">4px grid. The play view leans on 48–96 to give the keyboards breathing room. Negative space is the brand.</div>
</div>
</body></html>
