<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="../piano.css"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card split">
  <div class="pck-transport">
    <button title="Previous chord" aria-label="Previous chord">
      <svg viewBox="0 0 24 24"><path d="M14.5 5.5 L7 12 L14.5 18.5" fill="none" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <button class="primary" title="Play" aria-label="Play">
      <svg viewBox="0 0 24 24"><path d="M7.5 5.5 L18 12 L7.5 18.5 Z" fill="currentColor"/></svg>
    </button>
    <button title="Next chord" aria-label="Next chord">
      <svg viewBox="0 0 24 24"><path d="M9.5 5.5 L17 12 L9.5 18.5" fill="none" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
  </div>
  <div class="col" style="gap: 4px; flex: 1;">
    <div class="caption">Transport</div>
    <div class="label" style="font-size: 13px;">Back, Play, Next. Spacebar also triggers Play / Next.</div>
  </div>
</div>
</body></html>
