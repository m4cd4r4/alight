<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div style="display:grid; grid-template-columns: repeat(5, 1fr); gap: 10px;">
    <div class="col"><div style="height:64px; background:var(--ink-primary);"></div><div class="caption" style="margin-top:8px;">Ink primary</div><div class="value">20.0% 0.015 80</div></div>
    <div class="col"><div style="height:64px; background:var(--ink-secondary);"></div><div class="caption" style="margin-top:8px;">Secondary</div><div class="value">42.0% 0.012 80</div></div>
    <div class="col"><div style="height:64px; background:var(--ink-tertiary);"></div><div class="caption" style="margin-top:8px;">Tertiary</div><div class="value">60.0% 0.010 80</div></div>
    <div class="col"><div style="height:64px; background:var(--ink-ghost);"></div><div class="caption" style="margin-top:8px;">Ghost</div><div class="value">75.0% 0.008 80</div></div>
    <div class="col"><div style="height:64px; background:var(--hairline); border:1px solid var(--hairline-strong);"></div><div class="caption" style="margin-top:8px;">Hairline</div><div class="value">88.0% 0.010 80</div></div>
  </div>
</div>
</body></html>
