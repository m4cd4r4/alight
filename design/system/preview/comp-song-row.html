<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="../piano.css"><link rel="stylesheet" href="_card.css">
<style>
  .pck-song-row { padding: 12px 0; }
</style>
</head>
<body>
<div class="card" style="padding: 8px 24px; gap: 0;">
  <div class="pck-song-row">
    <div class="col">
      <div class="title">The Weight</div>
      <div class="artist">The Band</div>
    </div>
    <div class="pck-hand-badge"><span class="key">A</span></div>
    <div class="key" style="font-family: var(--font-display); font-size: 18px; color: var(--ink-secondary);">A</div>
  </div>
  <div class="pck-song-row">
    <div class="col">
      <div class="title">Bridge Over Troubled Water</div>
      <div class="artist">Simon &amp; Garfunkel</div>
    </div>
    <div class="pck-hand-badge"></div>
    <div class="key" style="font-family: var(--font-display); font-size: 18px; color: var(--ink-secondary);">E♭</div>
  </div>
  <div class="pck-song-row" style="border-bottom: 0;">
    <div class="col">
      <div class="title">Landslide</div>
      <div class="artist">Fleetwood Mac</div>
    </div>
    <div class="pck-hand-badge"></div>
    <div class="key" style="font-family: var(--font-display); font-size: 18px; color: var(--ink-secondary);">C</div>
  </div>
</div>
</body></html>
