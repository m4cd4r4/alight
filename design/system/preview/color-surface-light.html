<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div style="display:grid; grid-template-columns: repeat(5, 1fr); gap: 10px;">
    <div class="col"><div style="height:64px; background:var(--surface-base); border:1px solid var(--hairline);"></div><div class="caption" style="margin-top:8px;">Surface base</div><div class="value">98.4% 0.006 85</div></div>
    <div class="col"><div style="height:64px; background:var(--surface-raised); border:1px solid var(--hairline);"></div><div class="caption" style="margin-top:8px;">Raised</div><div class="value">96.2% 0.008 82</div></div>
    <div class="col"><div style="height:64px; background:var(--surface-sunken); border:1px solid var(--hairline);"></div><div class="caption" style="margin-top:8px;">Sunken</div><div class="value">94.0% 0.010 82</div></div>
    <div class="col"><div style="height:64px; background:var(--surface-key-white); border:1px solid var(--hairline);"></div><div class="caption" style="margin-top:8px;">Key, white</div><div class="value">99.5% 0.004 85</div></div>
    <div class="col"><div style="height:64px; background:var(--surface-key-black);"></div><div class="caption" style="margin-top:8px;">Key, black</div><div class="value">22.0% 0.012 80</div></div>
  </div>
</div>
</body></html>
