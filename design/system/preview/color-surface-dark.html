<!DOCTYPE html>
<html data-theme="dark"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div style="display:grid; grid-template-columns: repeat(5, 1fr); gap: 10px;">
    <div class="col"><div style="height:64px; background:var(--surface-base); border:1px solid var(--hairline);"></div><div class="caption" style="margin-top:8px;">Surface base</div><div class="value">16.0% 0.010 260</div></div>
    <div class="col"><div style="height:64px; background:var(--surface-raised); border:1px solid var(--hairline);"></div><div class="caption" style="margin-top:8px;">Raised</div><div class="value">20.0% 0.012 260</div></div>
    <div class="col"><div style="height:64px; background:var(--surface-sunken); border:1px solid var(--hairline);"></div><div class="caption" style="margin-top:8px;">Sunken</div><div class="value">13.0% 0.010 260</div></div>
    <div class="col"><div style="height:64px; background:var(--surface-key-white); border:1px solid var(--hairline);"></div><div class="caption" style="margin-top:8px;">Key, white</div><div class="value">92.0% 0.006 80</div></div>
    <div class="col"><div style="height:64px; background:var(--surface-key-black); border:1px solid var(--hairline);"></div><div class="caption" style="margin-top:8px;">Key, black</div><div class="value">8.0% 0.008 260</div></div>
  </div>
</div>
</body></html>
