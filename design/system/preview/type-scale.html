<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_card.css">
<style>
  table { border-collapse: collapse; width: 100%; }
  td { padding: 6px 0; border-bottom: 1px solid var(--hairline); vertical-align: baseline; }
  td.label { width: 130px; color: var(--ink-tertiary); font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; }
  td.size  { width: 70px; color: var(--ink-tertiary); font-variant-numeric: tabular-nums; font-size: 12px; }
</style>
</head>
<body>
<div class="card" style="padding-top: 18px; padding-bottom: 18px;">
  <table>
    <tr><td class="label">Display xl</td><td class="size">64px</td><td style="font-family: var(--font-display); font-size: 36px; line-height: 1;">Cmaj7</td></tr>
    <tr><td class="label">Display lg</td><td class="size">44px</td><td style="font-family: var(--font-display); font-size: 28px;">F♯ minor</td></tr>
    <tr><td class="label">Display md</td><td class="size">32px</td><td style="font-family: var(--font-display); font-size: 22px;">Songbook</td></tr>
    <tr><td class="label">Text lg</td><td class="size">19px</td><td style="font-family: var(--font-text); font-size: 17px;">The Weight — The Band</td></tr>
    <tr><td class="label">Text md</td><td class="size">15px</td><td style="font-family: var(--font-text); font-size: 15px;">Right hand: C E G</td></tr>
    <tr><td class="label">Text xs</td><td class="size">11px</td><td style="font-family: var(--font-text); font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase;">Inversion</td></tr>
  </table>
</div>
</body></html>
