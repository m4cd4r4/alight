<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_card.css">
<style>
  .specimen { display: flex; align-items: center; gap: 36px; padding: 8px 0; }
  .note { font-family: var(--font-text); font-size: 28px; font-weight: 700; font-variant-numeric: tabular-nums; letter-spacing: 0.01em; color: var(--ink-primary); }
  .finger { font-family: var(--font-text); font-size: 20px; color: var(--ink-secondary); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<div class="card">
  <div class="specimen">
    <div class="note">C</div>
    <div class="note">F♯</div>
    <div class="note">B♭</div>
    <div class="note">E♭</div>
    <div class="note">G</div>
    <div style="width: 1px; height: 32px; background: var(--hairline);"></div>
    <div class="finger">1</div>
    <div class="finger">2</div>
    <div class="finger">3</div>
    <div class="finger">4</div>
    <div class="finger">5</div>
  </div>
  <div class="label" style="font-size: 12px;">Note names use real Unicode music glyphs (♯ U+266F, ♭ U+266D), not ASCII. Finger numbers are 1–5 with 1 = thumb. Tabular figures lock vertical alignment across keys.</div>
</div>
</body></html>
