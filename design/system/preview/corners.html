<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div style="display:grid; grid-template-columns: repeat(4, 1fr); gap: 16px;">
    <div class="col" style="align-items:center; gap:10px;">
      <div style="width: 88px; height: 56px; background: var(--surface-raised); border: 1px solid var(--hairline-strong); border-radius: 0;"></div>
      <div class="caption">Key</div>
      <div class="value">0px</div>
    </div>
    <div class="col" style="align-items:center; gap:10px;">
      <div style="width: 88px; height: 56px; background: var(--surface-raised); border: 1px solid var(--hairline-strong); border-radius: 2px;"></div>
      <div class="caption">Card / button</div>
      <div class="value">2px</div>
    </div>
    <div class="col" style="align-items:center; gap:10px;">
      <div style="width: 88px; height: 56px; background: var(--surface-raised); border: 1px solid var(--hairline-strong); border-radius: 3px;"></div>
      <div class="caption">Pill tag</div>
      <div class="value">3px</div>
    </div>
    <div class="col" style="align-items:center; gap:10px;">
      <div style="width: 56px; height: 56px; background: var(--ink-primary); border-radius: 999px;"></div>
      <div class="caption">Marker</div>
      <div class="value">full</div>
    </div>
  </div>
  <div class="label" style="font-size: 12px;">Mixed and intentional. Mostly sharp. The 8–16px rounded-rect SaaS aesthetic is explicitly avoided.</div>
</div>
</body></html>
