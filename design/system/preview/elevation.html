<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap: 16px;">
    <div class="col" style="align-items:center; gap:10px;">
      <div style="width: 140px; height: 64px; background: var(--surface-raised);"></div>
      <div class="caption">Flat</div>
      <div class="value">--shadow-flat</div>
    </div>
    <div class="col" style="align-items:center; gap:10px;">
      <div style="width: 140px; height: 64px; background: var(--surface-raised); border: 1px solid var(--hairline);"></div>
      <div class="caption">Hairline</div>
      <div class="value">1px hairline</div>
    </div>
    <div class="col" style="align-items:center; gap:10px;">
      <div style="width: 140px; height: 64px; background: var(--surface-raised); box-shadow: var(--shadow-soft);"></div>
      <div class="caption">Soft</div>
      <div class="value">popover / toast only</div>
    </div>
  </div>
  <div class="label" style="font-size: 12px;">Bordered, not shadowed. The hairline does the work of separation. Reserved soft shadow for genuinely floating UI.</div>
</div>
</body></html>
