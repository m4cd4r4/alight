<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="../piano.css"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card" style="gap: 18px;">
  <div class="row" style="gap: 24px;">
    <div class="pck-segmented">
      <button aria-pressed="true">Simple</button>
      <button aria-pressed="false">Full</button>
    </div>
    <div class="caption">Voicing</div>
  </div>
  <div class="row" style="gap: 24px;">
    <div class="pck-segmented">
      <button aria-pressed="true">Sectioned</button>
      <button aria-pressed="false">Flat</button>
    </div>
    <div class="caption">Layout</div>
  </div>
  <div class="row" style="gap: 32px;">
    <label class="pck-switch">
      <input type="checkbox" checked>
      <span class="track"></span>
      Fingering
    </label>
    <label class="pck-switch">
      <input type="checkbox">
      <span class="track"></span>
      Metronome
    </label>
  </div>
</div>
</body></html>
